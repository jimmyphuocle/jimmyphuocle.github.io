<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: ui-sans-serif, system-ui, -apple-system,
                 "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background-color: #0e1411;
    color: #e8ece9;
    display: flex;
    align-items: center;
    padding: 0 80px;
    gap: 60px;
  }

  .portrait {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #222a25;
    flex-shrink: 0;
  }

  .text {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .name {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
  }

  .tagline {
    font-size: 26px;
    font-weight: 400;
    color: #8a968f;
    line-height: 1.4;
    max-width: 600px;
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 8px;
  }

  .pill {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 14px;
    border-radius: 999px;
    background-color: #2a4a36;
    color: #e8ece9;
    border: 1px solid #2a4a36;
  }

  .affiliation {
    font-size: 18px;
    color: #5e6b64;
  }

  .domain {
    position: absolute;
    bottom: 40px;
    right: 80px;
    font-size: 22px;
    color: #4a7c59;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>
  <img class="portrait" src="src/assets/portrait.jpg" alt="">
  <div class="text">
    <div class="name">Jimmy P. Le</div>
    <div class="tagline">
      NLP systems &amp; explainable biomedical
      question answering
    </div>
    <div class="meta">
      <span class="pill">PhD Researcher</span>
      <span class="affiliation">VCU NLP Lab · Dr. Bridget McInnes</span>
    </div>
  </div>
  <div class="domain">jimmyphuocle.com</div>
</body>
</html>
